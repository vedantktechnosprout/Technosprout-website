<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Thank You | Technosprout Systems Pvt. Ltd.</title>

<link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Font -->
<link href="https://fonts.cdnfonts.com/css/avenir" rel="stylesheet">

<style>

body{
font-family:'Avenir',sans-serif;
background:#f8f9fb;
}

/* THANKYOU SECTION */

.thankyou-section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:60px 20px;
}

/* CARD */

.thankyou-box{
background:#fff;
padding:60px 40px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
max-width:650px;
width:100%;
}

/* ICON */

.success-icon{

border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:25px;
padding:15px;
}

.success-icon img{
width:50%;
height:100%;
object-fit:contain;
}

/* TITLE */

.thankyou-title{
font-size:34px;
font-weight:700;
margin-bottom:15px;
color:#6d3f90;
}

/* TEXT */

.thankyou-text{
font-size:17px;
color:#555;
line-height:1.7;
margin-bottom:35px;
}

/* BUTTON */

.service-btn{
display:inline-flex;
align-items:center;
gap:12px;
padding:12px 26px;
background:#5e2c91;
color:#fff;
text-decoration:none;
border-radius:50px;
font-weight:600;
transition:0.3s;
}

.service-btn:hover{
background:#4a2273;
color:#fff;
}

/* ICON CIRCLE */

.service-icon{
width:34px;
height:34px;
border-radius:50%;
background:#fff;
color:#5e2c91;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

.service-btn:hover .service-icon{
transform:translateX(4px);
transition:0.3s;
}

/* MOBILE */

@media(max-width:768px){

.thankyou-box{
padding:45px 25px;
}

.thankyou-title{
font-size:28px;
}

.thankyou-text{
font-size:16px;
}

}

</style>

</head>

<body>

<section class="thankyou-section">

<div class="thankyou-box">

<div class="success-icon">
    <img src="assets/logo-transparent.png" alt="Technosprout Logo">
</div>

<h1 class="thankyou-title">
Thank You!
</h1>

<p class="thankyou-text">
Your form has been successfully submitted.  
Our team at <strong>Technosprout Systems Pvt. Ltd.</strong> will review your request and get back to you shortly.
<br><br>
We appreciate your interest in working with us to build structured and scalable technology solutions.
</p>

<a href="index.html" class="service-btn">
Back to Home
<span class="service-icon">
<i class="fa-solid fa-arrow-right"></i>
</span>
</a>

</div>

</section>

</body>
</html>
